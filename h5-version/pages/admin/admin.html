<div class="admin-page">
  <!-- 登录界面 -->
  <div class="admin-login" id="adminLogin">
    <div class="login-box">
      <div class="login-icon">🔐</div>
      <div class="login-title">管理后台</div>
      <input type="password" id="adminPassword" class="login-input" placeholder="请输入密码">
      <button class="login-btn" onclick="adminLogin()">登录</button>
      <!-- 默认密码提示已隐藏 -->
    </div>
  </div>

  <!-- 管理界面 -->
  <div class="admin-content" id="adminContent" style="display: none;">
    <!-- 头部 -->
    <div class="admin-header">
      <div class="admin-title">💕 恋爱进化论管理后台</div>
      <button class="logout-btn" onclick="adminLogout()">退出</button>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👤</div>
        <div class="stat-info">
          <div class="stat-value" id="totalUsers">0</div>
          <div class="stat-label">总用户数</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✨</div>
        <div class="stat-info">
          <div class="stat-value" id="totalCalculations">0</div>
          <div class="stat-label">测算次数</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔓</div>
        <div class="stat-info">
          <div class="stat-value" id="totalUnlocked">0</div>
          <div class="stat-label">已解锁</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <div class="stat-value" id="totalRevenue">¥0</div>
          <div class="stat-label">预估收入</div>
        </div>
      </div>
    </div>

    <!-- 解锁管理 -->
    <div class="admin-section">
      <div class="section-header">
        <span class="section-title">🔓 用户解锁管理</span>
        <div class="section-actions">
          <input type="text" id="searchUserId" class="search-input" placeholder="输入用户ID搜索">
          <button class="action-btn" onclick="searchUser()">搜索</button>
        </div>
      </div>
      
      <div class="unlock-form">
        <div class="form-row">
          <label>用户ID：</label>
          <input type="text" id="unlockUserId" class="form-input" placeholder="例如: USER123456">
        </div>
        <div class="form-row">
          <label>备注（可选）：</label>
          <input type="text" id="unlockNote" class="form-input" placeholder="解锁原因或备注">
        </div>
        <button class="unlock-btn" onclick="unlockUser()">确认解锁</button>
      </div>

      <div class="user-list" id="userList">
        <!-- 用户列表会在这里显示 -->
      </div>
    </div>

    <!-- 黑名单管理 -->
    <div class="admin-section">
      <div class="section-header">
        <span class="section-title">🚫 黑名单管理</span>
      </div>
      
      <div class="blacklist-form">
        <div class="form-row">
          <label>用户ID：</label>
          <input type="text" id="blacklistUserId" class="form-input" placeholder="要封禁的用户ID">
        </div>
        <div class="form-row">
          <label>封禁原因：</label>
          <input type="text" id="blacklistReason" class="form-input" placeholder="封禁原因">
        </div>
        <button class="blacklist-btn" onclick="addToBlacklist()">添加到黑名单</button>
      </div>

      <div class="blacklist-list" id="blacklistList">
        <!-- 黑名单会在这里显示 -->
      </div>
    </div>

    <!-- 系统设置 -->
    <div class="admin-section">
      <div class="section-header">
        <span class="section-title">⚙️ 系统设置</span>
      </div>
      
      <div class="settings-list">
        <div class="setting-item">
          <span>解锁价格</span>
          <div class="setting-value">
            <input type="number" id="unlockPrice" value="9.9" class="price-input">
            <span>元</span>
          </div>
        </div>
        <div class="setting-item">
          <span>客服微信号</span>
          <input type="text" id="wechatId" value="news-tomato" class="form-input">
        </div>
        <button class="save-btn" onclick="saveSettings()">保存设置</button>
      </div>
    </div>

    <!-- 数据管理 -->
    <div class="admin-section">
      <div class="section-header">
        <span class="section-title">💾 数据管理</span>
      </div>
      
      <div class="data-actions">
        <button class="data-btn export-btn" onclick="exportData()">📥 导出数据</button>
        <button class="data-btn clear-btn" onclick="clearAllData()">🗑️ 清空所有数据</button>
      </div>
    </div>
  </div>
</div>
